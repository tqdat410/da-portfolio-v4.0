<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 150" width="100%" height="150" preserveAspectRatio="none">
  <defs>
    <style>
      .wave1 { animation: moveLeft 12s linear infinite; }
      .wave2 { animation: moveRight 18s linear infinite; }
      .wave3 { animation: moveLeft 24s linear infinite; }

      @keyframes moveLeft {
        0% { transform: translateX(0); }
        100% { transform: translateX(-1000px); }
      }
      @keyframes moveRight {
        0% { transform: translateX(-1000px); }
        100% { transform: translateX(0); }
      }
    </style>

    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="35%" stop-color="#e5e7eb" />
      <stop offset="70%" stop-color="#9ca3af" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>

    <mask id="waves">
      <!-- Back wave -->
      <path class="wave3" fill="#fff" opacity="0.4" d="M 0 0 L 2000 0 L 2000 105 Q 1875 145 1750 105 T 1500 105 T 1250 105 T 1000 105 T 750 105 T 500 105 T 250 105 T 0 105 Z" />
      <!-- Middle wave -->
      <path class="wave2" fill="#fff" opacity="0.6" d="M 0 0 L 2000 0 L 2000 110 Q 1750 70 1500 110 T 1000 110 T 500 110 T 0 110 Z" />
      <!-- Front wave -->
      <path class="wave1" fill="#fff" opacity="1.0" d="M 0 0 L 2000 0 L 2000 100 Q 1750 150 1500 100 T 1000 100 T 500 100 T 0 100 Z" />
    </mask>
  </defs>

  <rect x="0" y="0" width="1000" height="150" fill="url(#bgGrad)" mask="url(#waves)" />
</svg>
